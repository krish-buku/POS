server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:8081"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: user-business-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/businesses/**

        - id: customer-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/customers/**

        - id: staff-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/staff/**

        - id: menu-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/menu/**

        - id: menu-image-assets
          uri: http://localhost:8084
          predicates:
            - Path=/menu-images/**

        - id: table-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/tables/**

        - id: order-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/payments/**

        - id: kitchen-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/kitchen/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        - id: ai-image-service
          uri: lb://ai-image-service
          predicates:
            - Path=/api/images/**

        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/reports/**

        - id: receipt-service
          uri: lb://receipt-service
          predicates:
            - Path=/api/receipts/**

        - id: file-storage-service
          uri: lb://file-storage-service
          predicates:
            - Path=/api/files/**

        - id: shift-service
          uri: lb://shift-service
          predicates:
            - Path=/api/shifts/**

        - id: realtime-gateway
          uri: lb://realtime-gateway
          predicates:
            - Path=/api/realtime/**,/ws/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
