server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:8081"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: ${BUKUKASIR_AUTH_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8081}}
          predicates:
            - Path=/api/auth/**

        - id: user-business-service
          uri: ${BUKUKASIR_BUSINESS_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8082}}
          predicates:
            - Path=/api/businesses/**

        - id: customer-service
          uri: ${BUKUKASIR_BUSINESS_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8082}}
          predicates:
            - Path=/api/customers/**

        - id: staff-service
          uri: ${BUKUKASIR_STAFF_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8083}}
          predicates:
            - Path=/api/staff/**

        - id: menu-service
          uri: ${BUKUKASIR_MENU_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8084}}
          predicates:
            - Path=/api/menu/**

        - id: menu-image-assets
          uri: ${BUKUKASIR_MENU_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8084}}
          predicates:
            - Path=/menu-images/**

        - id: table-service
          uri: ${BUKUKASIR_TABLE_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8085}}
          predicates:
            - Path=/api/tables/**

        - id: waiter-transfer-service
          uri: ${BUKUKASIR_TABLE_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8085}}
          predicates:
            - Path=/api/waiter-transfers/**

        - id: order-service
          uri: ${BUKUKASIR_ORDER_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8086}}
          predicates:
            - Path=/api/orders/**

        - id: order-session-service
          uri: ${BUKUKASIR_ORDER_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8086}}
          predicates:
            - Path=/api/order-sessions/**

        - id: bill-request-service
          uri: ${BUKUKASIR_ORDER_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8086}}
          predicates:
            - Path=/api/bill-requests/**

        - id: mobile-audit-events
          uri: ${BUKUKASIR_ORDER_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8086}}
          predicates:
            - Path=/api/audit-events/**

        - id: payment-service
          uri: ${BUKUKASIR_PAYMENT_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8087}}
          predicates:
            - Path=/api/payments/**

        - id: kitchen-service
          uri: ${BUKUKASIR_KITCHEN_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8088}}
          predicates:
            - Path=/api/kitchen/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        - id: ai-image-service
          uri: lb://ai-image-service
          predicates:
            - Path=/api/images/**

        - id: report-service
          uri: ${BUKUKASIR_REPORT_URI:${BUKUKASIR_CORE_API_URI:lb://report-service}}
          predicates:
            - Path=/api/reports/**

        - id: receipt-service
          uri: ${BUKUKASIR_RECEIPT_URI:${BUKUKASIR_CORE_API_URI:lb://receipt-service}}
          predicates:
            - Path=/api/receipts/**

        - id: print-job-service
          uri: ${BUKUKASIR_PRINT_JOB_URI:${BUKUKASIR_CORE_API_URI:http://localhost:8092}}
          predicates:
            - Path=/api/print-jobs/**

        - id: file-storage-service
          uri: ${BUKUKASIR_FILE_STORAGE_URI:${BUKUKASIR_CORE_API_URI:lb://file-storage-service}}
          predicates:
            - Path=/api/files/**

        - id: shift-service
          uri: ${BUKUKASIR_SHIFT_URI:${BUKUKASIR_CORE_API_URI:lb://shift-service}}
          predicates:
            - Path=/api/shifts/**

        - id: realtime-gateway
          uri: lb://realtime-gateway
          predicates:
            - Path=/api/realtime/**,/ws/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
