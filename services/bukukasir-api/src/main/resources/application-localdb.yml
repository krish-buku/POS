server:
  port: ${PORT:8095}

spring:
  datasource:
    url: ${LOCAL_DB_URL:jdbc:h2:file:./build/localdb/bukukasir;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${LOCAL_DB_USER:sa}
    password: ${LOCAL_DB_PASSWORD:}
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
  h2:
    console:
      enabled: true
      path: /h2-console
