server:
  port: ${PORT:8080}

spring:
  application:
    name: bukukasir-api
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
    username: ${SUPABASE_DB_USER:postgres.sqnvfgzamxhkagvgswkm}
    password: ${SUPABASE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# CORS configuration
bukukasir:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:8081
      - http://localhost:19006

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
