server:
  port: 8091
spring:
  application:
    name: report-service
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
springdoc:
  api-docs:
    path: /api/reports/v3/api-docs
management:
  endpoints:
    web:
      exposure:
        include: health,info
